services:
  mongo:
    image: mongo:7
    container_name: vinterra-demo-mongo
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - mongo-data:/data/db
    networks:
      - backend_network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    image: abhidocker47/vinterra-be-demo:latest
    container_name: vinterra-demo-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DB_URI: ${DB_URI}
    volumes:
      - ./certs:/app/certs:ro
    networks:
      - backend_network

volumes:
  mongo-data:

networks:
  backend_network:
    name: ${BACKEND_NETWORK}
    external: true
